<svg width="1200" height="320" viewBox="0 0 1200 320" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Me, Myself and I — mmi">
  <title>Me, Myself and I — mmi</title>
  <defs>
    <linearGradient id="banner-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A1A2E"/>
      <stop offset="100%" stop-color="#0B1117"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="320" rx="24" fill="url(#banner-bg)"/>
  <rect x="6" y="6" width="1188" height="308" rx="20"
        fill="none" stroke="#FFFFFF" stroke-opacity="0.05" stroke-width="1"/>

  <!-- Iconic A with diagonal strike -->
  <g transform="translate(120, 80)">
    <path d="M 0 160 L 80 0 L 160 160"
          fill="none" stroke="#EAEAEA" stroke-width="24"
          stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 32 112 L 128 112"
          fill="none" stroke="#EAEAEA" stroke-width="24"
          stroke-linecap="round"/>
    <line x1="-22" y1="148" x2="182" y2="-2"
          stroke="#E94560" stroke-width="18" stroke-linecap="round"/>
  </g>

  <!-- Wordmark -->
  <text x="360" y="158"
        font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace"
        font-size="68" font-weight="800"
        fill="#EAEAEA">me, myself and i</text>

  <!-- Subtitle bar -->
  <line x1="362" y1="184" x2="540" y2="184"
        stroke="#E94560" stroke-width="3" stroke-linecap="round"/>

  <!-- Tagline with terminal prompt -->
  <text x="360" y="226"
        font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace"
        font-size="22" font-weight="500"
        fill="#16C79A"><tspan fill="#E94560" font-weight="700">$ </tspan>mmi · strip the ai trails from your git commits</text>

  <!-- Footnote -->
  <text x="360" y="262"
        font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace"
        font-size="16" font-weight="400"
        fill="#EAEAEA" fill-opacity="0.45">a pre-commit hook · written in rust · single static binary</text>
</svg>
